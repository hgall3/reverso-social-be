# ============================
# APPLICATION NAME
# ============================
spring.application.name=reverso-social-be

# ============================
# DATABASE CONFIGURATION
# ============================
# Usamos variables de entorno para no exponer credenciales en GitHub
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================
# JPA / HIBERNATE
# ============================
# 'update' crea las tablas automáticamente en Neon por ti
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Esto ayuda a evitar errores de conexión en servicios gratuitos como Neon
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ============================
# SERVER CONFIGURATION
# ============================
# Render asignará un puerto automáticamente, si no, usa el 8080
server.port=${PORT:8080}

# ============================
# LOGGING
# ============================
logging.level.com.reverso=INFO
logging.level.org.springframework.security=INFO

# ============================
# TOKEN SETTINGS
# ============================
jwt.secret=${SECRET_KEY}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================
# JACKSON PARSER
# ============================
spring.jackson.parser.allow-unquoted-control-chars=true

# ============================
# FILE UPLOAD LIMITS
# ============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ============================
# SMTP CONFIGURATION (GMAIL)
# ============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================
# SECURITY & ADMIN
# ============================
app.admin.email=${ADMIN_EMAIL}
app.security.admin-password=${ADMIN_PASSWORD}
app.security.editor-password=${EDITOR_PASSWORD}

# ============================
# CORS CONFIGURATION
# ============================
# Importante para que tu Frontend pueda hablar con el Backend
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ============================
# CLOUDINARY STORAGE
# ============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ============================
# PROFILES
# ============================
spring.profiles.active=${APP_PROFILE:prod}